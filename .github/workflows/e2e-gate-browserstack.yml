name: E2E Gate Tests (BrowserStack)

permissions:
  actions: read
  contents: read
  checks: write

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'BrowserStack app ID (bs://...)'
        type: string
        required: true
      marker:
        description: 'Pytest marker to run'
        type: string
        default: 'gate'
      parallel:
        description: 'Number of parallel workers (0 = sequential)'
        type: string
        default: '0'

concurrency:
  group: e2e-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: 'pip'
          cache-dependency-path: test/e2e_appium/requirements.txt

      - name: Install dependencies
        working-directory: test/e2e_appium
        run: pip install -r requirements.txt

      - name: Run gate tests
        working-directory: test/e2e_appium
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_ID: ${{ inputs.app_id }}
        run: |
          PYTEST_CMD="python -m pytest -m ${{ inputs.marker }} --env=browserstack -v"
          PYTEST_CMD="$PYTEST_CMD --timeout=1200"
          PYTEST_CMD="$PYTEST_CMD --html=reports/gate-results.html --self-contained-html"
          PYTEST_CMD="$PYTEST_CMD --junitxml=reports/gate-junit.xml"

          if [ "${{ inputs.parallel }}" != "0" ]; then
            PYTEST_CMD="$PYTEST_CMD -n ${{ inputs.parallel }} --dist=loadscope"
          else
            PYTEST_CMD="$PYTEST_CMD --override-ini='addopts=-v --tb=short --strict-markers --timeout=1200 --reruns 0 --reruns-delay 5'"
          fi

          echo "🧪 Running: $PYTEST_CMD"
          eval $PYTEST_CMD

      - name: Test summary
        if: always()
        working-directory: test/e2e_appium
        run: |
          echo "## 🧪 Gate Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Marker** | \`${{ inputs.marker }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **App ID** | \`${{ inputs.app_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Parallel** | ${{ inputs.parallel }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "reports/gate-junit.xml" ]; then
            # Extract counts from JUnit XML
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/gate-junit.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/gate-junit.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/gate-junit.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))
            echo "| **Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Failed** | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| **Errors** | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | $TESTS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No JUnit report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-${{ github.run_number }}
          path: |
            test/e2e_appium/reports/**/*
          retention-days: 14
          if-no-files-found: warn
