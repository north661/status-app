extends: "base.yaml"

metadata:
  name: "browserstack"
  description: "BrowserStack cloud environment"

provider:
  name: "browserstack"
  options:
    app:
      source: "cloud_upload"
      app_id_template: "${BROWSERSTACK_APP_ID:-}"
    auth:
      username: "${BROWSERSTACK_USERNAME:-}"
      access_key: "${BROWSERSTACK_ACCESS_KEY:-}"
    build_name_template: "${BROWSERSTACK_BUILD_NAME:-${BROWSERSTACK_BUILD_IDENTIFIER:-${GIT_COMMIT:-Status Mobile}}}"
    build_identifier_template: "${BROWSERSTACK_BUILD_IDENTIFIER:-${GIT_COMMIT:-local}}"
    session_name_template: "${TEST_NAME:-${PYTEST_CURRENT_TEST:-Status Test}}"
    project_name: "${BROWSERSTACK_PROJECT_NAME:-Status E2E Appium}"
    hub_url: "https://hub-cloud.browserstack.com/wd/hub"
    max_parallel_sessions: 5
    plan_cache_ttl: 10
    sdk:
      enable_reporting: true

device_defaults:
  capabilities:
    platformName: "android"
    automationName: "UiAutomator2"
    newCommandTimeout: 300
    bstack:options:
      deviceOrientation: "landscape"
      "appiumVersion": "2.19.0"
      video: true
      debug: false
      networkLogs: false
      appiumLogs: true
      deviceLogs: true
      appProfiling: false
    orientation: "LANDSCAPE"
    appium:unicodeKeyboard: true
    appium:resetKeyboard: true
    appium:ignoreHiddenApiPolicyError: true


devices:
  default: "dynamic_samsung_tab"
  matrix:
    - id: "dynamic_samsung_tab"
      display_name: "Any Galaxy Tab (Android 12-16)"
      capabilities:
        deviceName: "Samsung Galaxy Tab.*"
        platformVersion: "12|13|14|15|16"
        platformName: "android"
    - id: "galaxy_tab_s10p_android_15"
      display_name: "Galaxy Tab S10 Plus – Android 15"
      tags: ["android", "tablet", "cloud"]
      capabilities:
        platformVersion: "15.0"
        deviceName: "Samsung Galaxy Tab S10 Plus"
    - id: "pixel_8_android_14"
      display_name: "Pixel 8 - Android 14"
      tags: ["android", "phone", "cloud"]
      capabilities:
        platformName: "android"
        platformVersion: "14"
        deviceName: "Google Pixel 8"
    - id: "pixel_7_android_13"
      display_name: "Pixel 7 - Android 13"
      tags: ["android", "phone", "cloud"]
      capabilities:
        platformName: "android"
        platformVersion: "13"
        deviceName: "Google Pixel 7"
    - id: "samsung_s23_android_13"
      display_name: "Samsung Galaxy S23 - Android 13"
      tags: ["android", "phone", "cloud"]
      capabilities:
        platformName: "android"
        platformVersion: "13"
        deviceName: "Samsung Galaxy S23"
    # --- iOS devices ---
    - id: "ipad_10th_gen_ios_16"
      display_name: "iPad 10th Gen – iOS 16"
      tags: ["ios", "tablet", "cloud"]
      capabilities:
        platformName: "iOS"
        automationName: "XCUITest"
        platformVersion: "16"
        deviceName: "iPad 10th"
    - id: "ipad_air_6th_gen_ios_18"
      display_name: "iPad Air 6th Gen – iOS 18"
      tags: ["ios", "tablet", "cloud"]
      capabilities:
        platformName: "iOS"
        automationName: "XCUITest"
        platformVersion: "18"
        deviceName: "iPad Air (6th generation)"
    - id: "iphone_15_ios_17"
      display_name: "iPhone 15 – iOS 17"
      tags: ["ios", "phone", "cloud"]
      capabilities:
        platformName: "iOS"
        automationName: "XCUITest"
        platformVersion: "17"
        deviceName: "iPhone 15"

execution:
  concurrency:
    max_sessions: 5
    per_device_limit: 2
  retry_failed_tests: 1
  queue_throttle:
    enabled: true
    poll_interval: 20
    timeout: 180
    parallel_buffer: 1
    queue_buffer: 1
  pytest:
    addopts: ["-n", "2"]

logging:
  level: "INFO"
  enable_xml_report: true
  enable_html_report: true
